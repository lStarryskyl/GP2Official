[build]
  base = "frontend"
  publish = "dist"
  command = "npm ci && npm run build"
  
[build.environment]
  NODE_VERSION = "20"
  # Will be set via Netlify dashboard
  VITE_API_URL = ""

# API proxy redirects to backend
[[redirects]]
  from = "/api/*"
  to = "https://gp2official-backend.onrender.com/api/:splat"
  status = 200
  force = true
  
# WebSocket proxy for real-time collaboration
[[redirects]]
  from = "/ws/*"
  to = "https://gp2official-backend.onrender.com/ws/:splat"
  status = 200
  force = true

# SPA routing - catch all
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

