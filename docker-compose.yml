version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: gp2_mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-password}
      - MONGO_INITDB_DATABASE=${DATABASE_NAME:-architect_ai}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - gp2_network

  redis:
    image: redis:7-alpine
    container_name: gp2_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gp2_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gp2_backend
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY}
      - MONGO_URL=mongodb://mongodb:27017
      - DATABASE_NAME=${DATABASE_NAME:-architect_ai}
      - REDIS_URL=redis://redis:6379
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - LLM_PROVIDER=${LLM_PROVIDER:-stub}
      - LLM_API_KEY=${LLM_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
      - redis
    networks:
      - gp2_network
    volumes:
      - ./logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gp2_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    networks:
      - gp2_network

volumes:
  mongodb_data:
  redis_data:

networks:
  gp2_network:
    driver: bridge
