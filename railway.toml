[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# ─── Backend Service ───────────────────────────────────────────────────────────
[[services]]
name = "backend"
source = "backend"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[services.build]
buildCommand = "pip install -r requirements.txt"

[services.deploy]
healthcheckPath = "/api/ai/health"
healthcheckTimeout = 30

# ─── Frontend Service ──────────────────────────────────────────────────────────
[[services]]
name = "frontend"
source = "frontend"
startCommand = "npx serve dist -p $PORT --single"

[services.build]
buildCommand = "npm install && npm run build"

# ─── Required Railway Environment Variables ────────────────────────────────────
# Set these in the Railway dashboard → Service → Variables
#
# BACKEND:
#   DATABASE_URL              auto-injected by Railway Postgres plugin
#   REDIS_URL                 auto-injected by Railway Redis plugin
#   GEMINI_API_KEY            your Gemini API key
#   SECRET_KEY                random 64-char string  (openssl rand -hex 32)
#   FRONTEND_ORIGIN           https://your-frontend.up.railway.app
#   PLANTUML_API_KEY          3e4f5f2210msha6dc6e53bf539afp111b1ejsn6280b77597bc
